<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ChessRoot — Chess Opening Explorer & Analysis</title>
    <base href="/" />
    <meta
      name="description"
      content="Explore chess openings, analyze positions, and track your achievements with ChessRoot. Free interactive chess tools powered by Lichess and Chess.com data."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chessroot.org/" />
    <meta property="og:title" content="ChessRoot — Chess Opening Explorer & Analysis" />
    <meta
      property="og:description"
      content="Explore chess openings, analyze positions, and track your achievements with ChessRoot. Free interactive chess tools."
    />
    <meta property="og:image" content="https://chessroot.app/icon.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChessRoot — Chess Opening Explorer & Analysis" />
    <meta
      name="twitter:description"
      content="Explore chess openings, analyze positions, and track your achievements with ChessRoot."
    />
    <meta name="twitter:image" content="https://chessroot.app/icon.svg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ChessRoot",
        "url": "https://chessroot.org/",
        "description": "Explore chess openings, analyze positions, and track your achievements with ChessRoot. Free interactive chess tools powered by Lichess and Chess.com data."
      }
    </script>

    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />

    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="manifest" href="manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="/fonts/jetbrains-mono.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <script>
      (function () {
        var theme = localStorage.getItem('chess-theme');
        if (
          theme === 'dark' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark-theme');
        } else {
          document.documentElement.classList.add('light-theme');
        }
      })();
    </script>
  </head>
  <body>
    <cr-root></cr-root>
  </body>
</html>
